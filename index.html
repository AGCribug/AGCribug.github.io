<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Hong's Lab</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- 1.顶栏 -->
    <nav class="navbar">
        <!-- 左：logo -->
        <div class="nav-logo">
            <img src="images/ENL.png" alt="ENL" class="ENL">
        </div>
        <!-- 中：导航按钮 -->
        <div class="nav-center">
            <button data-page="1_home_zh">首　　页</button>
            <button data-page="2_research_zh">研究方向</button>
            <button data-page="3_publications_zh">学术成果</button>
            <button data-page="4_members_zh">组内成员</button>
            <button data-page="5_news_zh">组内新闻</button>
            <button data-page="6_contact_zh">联络方式</button>
        </div>
        <!-- 右：语言切换 -->
        <div class="nav-right">
            <div class="lang-menu-group">
                <button class="lang-btn">🌐</button>
                <div class="lang-menu">
                    <button data-lang="en">English</button>
                    <button data-lang="zh">简体中文</button>
                </div>
            </div>
        </div>
    </nav>
    <!-- 2.主内容 -->
    <div class="main-content" id="main-content"></div>
    <!-- 3.底栏 -->
    <footer class="footer">
        <div class="footer-container">
            <!-- 3.1 校徽 -->
            <div class="footer-logo-box">
                <a href="https://www.wit.edu.cn" target="_blank">
                    <img src="images/WIT.png" alt="WIT" class="WIT">
                </a>
                <a href="https://www.cup.edu.cn" target="_blank">
                    <img src="images/CUPB.png" alt="CUPB" class="CUPB">
                </a>
                <a href="https://www.xmu.edu.cn" target="_blank">
                    <img src="images/XMU.png" alt="XMU" class="XMU">
                </a>
            </div>
            <!-- 3.2 信息 -->
            <div class="footer-info">
                <div>
                    版权所有 © <span id="year"></span> Henry N. Hong
                </div>
                <div>
                    地址：福建省厦门市翔安区翔安南路4221号，361102
                </div>
            </div>
            <!-- 3.3 链接 -->
            <div class="footer-links">
                <div class="menu-group">
                    <button class="menu-btn">学术资源</button>
                    <div class="menu">
                        <a href="https://www.webofscience.com" target="_blank">Web of Science</a>
                        <a href="https://www.sciencedirect.com" target="_blank">爱思唯尔</a>
                        <a href="https://www.cnki.net" target="_blank">中国知网</a>
                    </div>
                </div>
                <div class="menu-group">
                    <button class="menu-btn">科研工具</button>
                    <div class="menu">
                        <a href="http://www.gromacs.org" target="_blank">GROMACS</a>
                        <a href="https://www.lammps.org" target="_blank">LAMMPS</a>
                        <a href="http://www.srim.org" target="_blank">SRIM</a>
                        <a href="https://chat.openai.com" target="_blank">ChatGPT</a>
                    </div>
                </div>
            </div>
            <!-- 3.4 日期 + 访问 -->
            <div class="footer-meta">
                更新日期：<span id="date"></span> | 浏览人次：<span id="visits"></span>
            </div>
        </div>
    </footer>
    <script src="js/index.js"></script>
</body>
</html>
