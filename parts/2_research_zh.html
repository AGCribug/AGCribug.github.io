        <p>分子动力学（MD）采用源自经典力学的简单势能函数来描述原子间的相互作用，并近似大量分子的动态行为。通常，分子动力学模拟是在原子数少于 200 万且时间跨度小于 2000 纳秒的系统中进行的。</p>
